name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. SAST & Secret Scanning
  security-scan:
    name: Security & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for Gitleaks to check history

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ruff bandit

      - name: Ruff (Linting)
        run: ruff check app

      - name: Bandit (Python SAST)
        run: bandit -r app/ -f custom

      - name: Hadolint (Docker Lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # 2. Testing
  test:
    name: Pytest & Integration
    needs: security-scan
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/test_db
          SECRET_KEY: test_secret_key
        run: python -m pytest

  # 3. Build, Scan & SBOM
  build-and-scan:
    name: Build & Image Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t projectglassbox-app .

      - name: Trivy (Container Vulnerability Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'projectglassbox-app'
          format: 'table'
          exit-code: '1' # Fail the build on CRITICAL vulnerabilities
          severity: 'CRITICAL,HIGH'

      - name: "Generate SBOM (format: CycloneDX)"
        uses: anchore/sbom-action@v0
        with:
          image: projectglassbox-app
          format: cyclonedx-json
          output-file: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # 4. DAST Scan (Dynamic Analysis)
  dast-scan:
    name: OWASP ZAP (DAST Scan)
    needs: build-and-scan
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Start App
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/test_db
          SECRET_KEY: test_secret_key
        run: |
          docker build -t projectglassbox-app .
          # Run container with --network host so it can reach the postgres service on localhost
          docker run -d --network host -e DATABASE_URL=$DATABASE_URL -e SECRET_KEY=$SECRET_KEY projectglassbox-app
          
          echo "Waiting for app to start..."
          timeout 60s bash -c 'until curl -s http://localhost:8000 > /dev/null; do sleep 2; done'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          fail_action: true
          # rules_file_name: '.zap/rules.tsv' # Optional configuration

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
