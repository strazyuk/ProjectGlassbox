name: CI/CD Pipeline

# 1. The Trigger: When does this workflow run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. The Jobs: What major tasks should happen?
jobs:
  # The first job: Linting (Checking for code style)
  lint:
    runs-on: ubuntu-latest
    steps:
      # Step A: Get the code from GitHub
      - uses: actions/checkout@v4

      # Step B: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step C: Install the "Ruff" linter
      - name: Install dependencies
        run: pip install ruff

      # Step D: Run the linting check
      - name: Run ruff
        run: ruff check app

  # The second job: Testing (Running pytest)
  test:
    runs-on: ubuntu-latest
    
    # 3. Service Containers: Running PostgreSQL for tests
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        # Wait for the DB to be ready before starting tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Tell the app to use the test DB
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/test_db
          SECRET_KEY: test_secret_key
        run: pytest

  # The third job: Build (Checking if Docker builds)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build . --file Dockerfile
